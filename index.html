<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <title>Unity Web Player | Five Night's at BIG E</title>
    <link rel="stylesheet" href="TemplateData/style.css">
  </head>
  <body>
    <div id="unity-container">
      <canvas id="unity-canvas" width=960 height=600></canvas>
    </div>
    <script>
      // Helper to fetch and stitch the .part files
      async function fetchPart(url) {
        const response = await fetch(url);
        return await response.arrayBuffer();
      }

      async function getMergedFile(baseName, count) {
        let parts = [];
        for (let i = 1; i <= count; i++) {
          parts.push(await fetchPart(baseName + ".part" + i));
        }
        return URL.createObjectURL(new Blob(parts));
      }

      (async () => {
        // Stitch the parts together
        const [dataUrl, wasmUrl] = await Promise.all([
          getMergedFile("Build/fnae.data", 3),
          getMergedFile("Build/fnae.wasm", 3)
        ]);

        var canvas = document.querySelector("#unity-canvas");
        var config = {
          dataUrl: dataUrl,
          frameworkUrl: "Build/fnae.framework.js",
          codeUrl: wasmUrl,
          streamingAssetsUrl: "StreamingAssets",
        };

        var script = document.createElement("script");
        script.src = "Build/fnae.loader.js";
        script.onload = () => createUnityInstance(canvas, config);
        document.body.appendChild(script);
      })();
    </script>
  </body>
</html>
